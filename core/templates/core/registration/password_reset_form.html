{% extends 'core/base.html' %}

{% block title %}Reset Password | Campus Recovery Hub{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100">
        <div class="text-center">
            <h2 class="text-3xl font-black text-[#003366] tracking-tight">Forgot Password?</h2>
            <p class="mt-3 text-slate-400 font-medium">Enter your email and we'll send you a recovery link.</p>
        </div>
        
        <form method="POST" class="mt-8 space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                <input type="email" name="email" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#003366]/10 focus:bg-white placeholder:text-slate-300 transition-all" placeholder="Enter your registered email">
            </div>

            <div>
                <button type="submit" class="w-full bg-[#003366] py-4 rounded-2xl text-white text-sm font-black shadow-xl shadow-blue-900/20 hover:bg-[#002244] transition-all flex items-center justify-center space-x-2">
                    <span>Send Reset Link</span>
                </button>
            </div>
        </form>

        <div class="text-center">
            <a href="{% url 'login' %}" class="text-xs font-bold text-[#FF007F] uppercase tracking-widest hover:opacity-70 transition-opacity">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
