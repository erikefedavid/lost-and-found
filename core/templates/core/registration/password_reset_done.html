{% extends 'core/base.html' %}

{% block title %}Email Sent | Campus Recovery Hub{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full text-center space-y-8 bg-white p-12 rounded-[2.5rem] shadow-2xl border border-slate-100">
        <div class="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-[#003366]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
        <h2 class="text-3xl font-black text-[#003366] tracking-tight">Check your email</h2>
        <p class="text-slate-400 font-medium">We've sent a password reset link to your email. Please check your inbox and follow the instructions.</p>
        
        <div class="pt-6">
            <a href="{% url 'login' %}" class="inline-block px-8 py-3 bg-[#003366] text-white text-xs font-black rounded-xl hover:bg-[#002244] transition-all">
                Return to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
