{% extends 'core/base.html' %}

{% block title %}Password Changed | Campus Recovery Hub{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full text-center space-y-8 bg-white p-12 rounded-[2.5rem] shadow-2xl border border-slate-100">
        <div class="w-20 h-20 bg-emerald-50 rounded-3xl flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-3xl font-black text-[#003366] tracking-tight">Success!</h2>
        <p class="text-slate-400 font-medium">Your password has been reset successfully. You can now log in with your new password.</p>
        
        <div class="pt-6">
            <a href="{% url 'login' %}" class="inline-block w-full py-4 bg-[#003366] text-white text-sm font-black rounded-2xl shadow-xl shadow-blue-900/20 hover:bg-[#002244] transition-all">
                Log In Now
            </a>
        </div>
    </div>
</div>
{% endblock %}
